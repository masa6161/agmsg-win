# arc configuration file
# See https://github.com/masa6161/arc-cli for documentation.

# Number of parallel reviewers (default: 5)
# This applies ONLY to flat review path (auto-phase OFF, no --phase).
# --phase small uses small_diff_reviewers; --phase medium uses
# medium_diff_reviewers. Auto-phase selects automatically by diff size.
reviewers: 5

# Number of diff groups in auto-phase grouped path (large diff). Default: 4.
# Each group reviews a subset of changed files. arch reviewer is always 1
# (sees full diff). Total reviewers in grouped path = 1 + large_diff_reviewers.
large_diff_reviewers: 4

# Number of reviewers in auto-phase small path. Default: 1.
# Small diff = files <= 3 AND lines <= 100. Flat diff-only review (no arch).
small_diff_reviewers: 1

# Number of diff reviewers in auto-phase medium path. Default: 2.
# arch reviewer is always 1. Total reviewers in medium path =
# 1 + medium_diff_reviewers.
medium_diff_reviewers: 2

# Maximum concurrent reviewers (default: same as reviewers)
# concurrency: 0

# Base branch for diff comparison (default: main)
# base: main

# Timeout per reviewer, Go duration format (default: 10m)
# timeout: 10m

# Retry failed reviewers N times (default: 1)
# retries: 1

# Fetch latest base ref from origin before diff (default: true)
# fetch: true

# Agent(s) for reviews: codex, claude, gemini
reviewer_agents:
  - codex
  - claude
  - gemini

# NEW (Round-9): per-phase agent override for auto-phase grouped diff path.
# - arch_reviewer_agent: single agent for the arch phase (sees full diff).
#   If unset, falls back to the first entry of reviewer_agents.
# - diff_reviewer_agents: list for the grouped diff phase (round-robin per group).
#   If unset, falls back to reviewer_agents.
# Use this to route unreliable backends (e.g., capacity-throttled providers)
# away from grouped diff while keeping them in flat review.
arch_reviewer_agent: codex
diff_reviewer_agents:
  - codex
#   - claude

# Agent for summarization: codex, claude, gemini
summarizer_agent: claude

# Codex CLI home is intentionally not configured in .arc.yaml because this file
# is repository-controlled. Set ARC_CODEX_HOME as a Windows User environment
# variable instead.
# Precedence: ARC_CODEX_HOME > CODEX_HOME > USERPROFILE/HOME/.codex

# Path to file containing review guidance
# guidance_file: ""

# Filtering configuration
# filters:
#   exclude_patterns:
#     - "pattern to exclude"

# False positive filtering/triage
fp_filter:
  enabled: true
  threshold: 75
  triage: true           # severity triage (blocking/advisory/noise) を有効化
  # show_noise: false    # noise 指摘を表示（既定: 非表示）
  agent: codex           # FP filter/triage 用エージェント (default: summarizer_agent)
  model: gpt-5.5         # FP filter/triage 用モデル (default: summarizer_model)
  effort: high           # FP filter/triage 用 effort (default: summarizer と同じ)

# Cross-check configuration (Round-9 contract: model is REQUIRED when enabled,
# comma-separated count must match agent list, paired positionally).
cross_check:
  enabled: true
  agent: "codex,claude,gemini"
  model: "gpt-5.5,claude-opus-4-6,gemini-3.1-pro-preview"

# PR feedback summarization
# pr_feedback:
#   enabled: true
#   agent: ""

# ------------------------------------------------------------------------
# models: per-size / per-role / per-agent model and thinking-effort matrix
# ------------------------------------------------------------------------
# Resolution precedence (highest → lowest; Model and Effort resolve
# independently, so partial overrides cascade):
#   CLI flag (--reviewer-model etc.)
#     > models.agents.<agent>.<role>
#     > models.sizes.<size>.<role>
#     > models.defaults.<role>
#     > legacy fields (reviewer_model, summarizer_model, cross_check.model)
#     > agent built-in default
#
# Roles:
#   reviewer       — flat review (auto-phase OFF / size=small / --phase diff)
#                    and fallback for arch_reviewer / diff_reviewer when those
#                    are unset at the same cascade layer.
#   arch_reviewer  — auto-phase medium/large の arch フェーズのみ
#   diff_reviewer  — auto-phase medium/large の diff フェーズのみ
#   summarizer     — finding clustering
#   fp_filter      — false-positive detection
#   cross_check    — grouped-phase 間の整合検査
#   pr_feedback    — 既存 PR コメント要約
#
# Sizes (auto-phase 判定): small / medium / large
#
# Per-backend model catalog (representative; 実際の catalog は各 CLI の
# --help / upstream release notes を参照):
#
#   codex (OpenAI Codex CLI):
#     model:  gpt-5.4, gpt-5.4-mini  (legacy: o3, o3-mini 等)
#     effort: low | medium | high    → `-c model_reasoning_effort=<value>` にマッピング
#
#   claude (Claude Code CLI):
#     model:  claude-opus-4-7, claude-sonnet-4-6, claude-haiku-4-5
#             (短縮形 sonnet-4-6 / sonnet / opus 等も CLI が解釈)
#     effort: low | medium | high | xhigh | max → --effort にマッピング
#             (session-scoped; 利用可能レベルはモデルに依存)
#             数値や未知値は silently drop される。
#
#   gemini (Gemini CLI):
#     model:  gemini-3.1-pro, gemini-2.5-pro, gemini-2.5-flash
#     effort: 未対応（設定しても silently ignored）
#
# Footguns:
# - defaults.<role>.model は全 agent 横断に適用されるため、`gpt-5.4` を
#   defaults に書くと claude/gemini reviewer も gpt-5.4 を試みて失敗する。
#   **model は agents.<name>.<role> で agent 別に明示する**のが安全。
#   defaults には effort（agent 側で解釈される）のみ書くパターン推奨。
# - reviewer_agents に同じバックエンドを複数並べた場合（例:
#   [codex, codex, codex]）、それらは全インスタンス agents.codex.reviewer
#   を共有する。per-instance の差分は現状サポートしない。
# ------------------------------------------------------------------------
models:
  defaults:
    # effort のみ共通定義。model は agent 側で解釈が異なるため
    # defaults.<role>.model は書かない（footgun 参照）。
    reviewer:      { effort: medium }
    arch_reviewer: { effort: high }
    diff_reviewer: { effort: medium }
    summarizer:    { effort: high }
    cross_check:   { effort: high }
  sizes:
    # 規模別の effort 上書き（model は agents 層に任せる）
    small:
      reviewer:      { effort: medium }
    large:
      arch_reviewer: { effort: high }
      diff_reviewer: { effort: high }
      summarizer:    { effort: high }
      cross_check:   { effort: high }
  agents:
    codex:
      reviewer:      { model: gpt-5.5 }
      arch_reviewer: { model: gpt-5.5 }
      diff_reviewer: { model: gpt-5.5 }
      cross_check:   { model: gpt-5.5 }
    claude:
      reviewer:      { model: claude-sonnet-4-6 }
      arch_reviewer: { model: claude-opus-4-6 }
      summarizer:    { model: claude-opus-4-6 }
      cross_check:   { model: claude-opus-4-6 }
    gemini:
      # gemini は effort 未対応。model のみ指定
      reviewer:      { model: gemini-3.1-pro-preview }
      cross_check:   { model: gemini-3.1-pro-preview }
